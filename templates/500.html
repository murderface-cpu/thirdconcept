<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error — Third Concept</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--ink:#0d1117;--clay:#d4735a;--clay-dim:rgba(212,115,90,0.1);--gold:#e8b86d;--text:#f0ece4;--muted:#4f6278;}
        html,body{height:100%}
        body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 600px 600px at 50% 40%,rgba(212,115,90,0.06) 0%,transparent 70%),url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");background-size:cover,180px;pointer-events:none;}
        .wrap{position:relative;z-index:1;text-align:center;padding:32px;animation:fadeUp .5s cubic-bezier(.4,0,.2,1);}
        @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
        .num{font-family:'Syne',sans-serif;font-size:clamp(96px,20vw,160px);font-weight:800;line-height:1;color:transparent;-webkit-text-stroke:2px rgba(212,115,90,0.25);letter-spacing:-.04em;margin-bottom:12px;}
        h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:var(--text);margin-bottom:10px}
        p{font-size:15px;color:var(--muted);max-width:380px;margin:0 auto 32px;line-height:1.6}
        .pill{display:inline-flex;align-items:center;gap:8px;background:var(--clay-dim);border:1px solid rgba(212,115,90,0.15);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--clay);font-weight:600;margin-bottom:28px;letter-spacing:.04em}
        .dot{width:6px;height:6px;border-radius:50%;background:var(--clay);animation:blink 1.4s ease-in-out infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;text-decoration:none;transition:all 200ms cubic-bezier(.4,0,.2,1);border:1px solid transparent;font-family:'DM Sans',sans-serif;}
        .btn-primary{background:var(--clay);color:#fff;border-color:var(--clay)}
        .btn-primary:hover{opacity:.9;box-shadow:0 6px 20px rgba(212,115,90,0.2);transform:translateY(-1px)}
        .btn-ghost{background:transparent;color:var(--muted);border-color:rgba(255,255,255,0.08)}
        .btn-ghost:hover{background:rgba(255,255,255,0.04);color:var(--text)}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="pill"><div class="dot"></div>INCIDENT DETECTED</div>
        <div class="num">500</div>
        <h1>Something went wrong</h1>
        <p>The server encountered an unexpected error. Our team has been notified. Please try again in a moment.</p>
        <div class="actions">
            <a href="{{ url_for('home') }}" class="btn btn-primary">← Return Home</a>
            <button onclick="location.reload()" class="btn btn-ghost">Try Again</button>
        </div>
    </div>
</body>
</html>
